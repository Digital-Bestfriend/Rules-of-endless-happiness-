<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ГЛАВНАЯ // ЦЕНТРАЛЬНЫЙ УЗЕЛ</title>
    <style>
        /* Глобальный запрет взаимодействия с текстом */
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            cursor: default;
        }

        body {
            background-color: #ffffff;
            color: #1a1a1a;
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            text-transform: uppercase;
            overflow: hidden;
        }

        /* Защитный невидимый слой */
        .shield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: rgba(0,0,0,0);
        }

        .top-bar {
            width: 100%;
            padding: 15px 30px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 10px;
            color: #ccc;
            display: flex;
            justify-content: flex-end; /* Все элементы теперь справа */
            gap: 30px;
            box-sizing: border-box;
            letter-spacing: 1px;
        }

        .content {
            margin-top: 150px;
            width: 80%;
            max-width: 500px;
            z-index: 100;
        }

        .welcome-plaque {
            border: 1px solid #1a1a1a;
            padding: 50px 20px;
            text-align: center;
            background-color: #ffffff;
            position: relative;
        }

        .welcome-text {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            margin: 0;
        }

        .smile {
            display: block;
            margin-top: 20px;
            color: #1a1a1a;
            font-size: 20px;
            font-weight: bold;
        }

        .happiness-index {
            margin-top: 40px;
            font-size: 11px;
            color: #999;
            text-align: center;
            letter-spacing: 2px;
        }

        .blink {
            animation: blinker 2s linear infinite;
            color: #00ff00; /* Зеленый огонек связи */
        }

        @keyframes blinker {
            50% { opacity: 0.2; }
        }
    </style>
</head>
<body>

    <noscript>
        <div style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; color: #000; display: flex; align-items: center; justify-content: center; z-index: 100000; text-align: center; font-family: 'Courier New', monospace;">
            ОШИБКА ДОСТУПА. ВКЛЮЧИТЕ ПОДДЕРЖКУ СКРИПТОВ.
        </div>
    </noscript>

    <div class="shield"></div>

    <div class="top-bar">
        <span>ЛИМИТ СЛОВ: 500/500</span>
        <span><span class="blink">●</span> СВЯЗЬ УСТАНОВЛЕНА</span>
    </div>

    <div class="content">
        <div class="welcome-plaque">
            <h1 class="welcome-text">Добро пожаловать, Друг!</h1>
            <span class="smile">[ :) ]</span>
        </div>

        <div class="happiness-index">
            ВАШ ТЕКУЩИЙ УРОВЕНЬ СЧАСТЬЯ: 98.4%
        </div>
    </div>

    <script>
        // Блокировка контекстного меню
        document.addEventListener('contextmenu', event => event.preventDefault());

        // Блокировка перетаскивания
        document.addEventListener('dragstart', event => event.preventDefault());

        // Блокировка горячих клавиш (Ctrl+C, Ctrl+U, F12, Ctrl+S)
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || 
               (e.ctrlKey && e.shiftKey && e.keyCode == 73) || 
               (e.ctrlKey && e.keyCode == 85) || 
               (e.ctrlKey && e.keyCode == 83) || 
               (e.ctrlKey && e.keyCode == 67)) {
                return false;
            }
        };
    </script>
</body>
</html>
