<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>АВТОРИЗАЦИЯ // ЦЕНТРАЛЬНЫЙ ТЕРМИНАЛ</title>
    <style>
        body {
            background-color: #ffffff;
            color: #1a1a1a;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-transform: uppercase;
        }

        .header {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .captcha-box {
            border: 1px solid #1a1a1a;
            padding: 20px;
            width: 320px;
            background: #f9f9f9;
        }

        .instruction {
            background: #1a1a1a;
            color: #fff;
            padding: 15px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }

        .cell {
            width: 100px;
            height: 100px;
            background: #eee;
            cursor: pointer;
            border: 2px solid transparent;
            position: relative;
            background-size: cover;
            background-position: center;
        }

        .cell.selected {
            border-color: #00ff00;
        }

        .cell.selected::after {
            content: '✓';
            position: absolute;
            top: 5px;
            right: 5px;
            background: #00ff00;
            color: #fff;
            font-size: 12px;
            padding: 2px 5px;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }

        button:hover {
            background: #333;
        }

        #message {
            margin-top: 15px;
            font-size: 10px;
            text-align: center;
            height: 12px;
        }
    </style>
</head>
<body>

    <div class="header">ЦЕНТРАЛЬНЫЙ УЗЕЛ // АВТОРИЗАЦИЯ</div>

    <div class="captcha-box">
        <div class="instruction">
            ВЫБЕРИТЕ ВСЕ ИЗОБРАЖЕНИЯ, ГДЕ ЛЮДИ <br><strong>ДЕЙСТВИТЕЛЬНО СЧАСТЛИВЫ</strong>
        </div>
        
        <div class="grid" id="grid">
            <div class="cell" onclick="toggle(this)" data-id="1" style="background-image: url('img/1.jpg')"></div>
            <div class="cell" onclick="toggle(this)" data-id="2" style="background-image: url('img/2.jpg')"></div>
            <div class="cell" onclick="toggle(this)" data-id="3" style="background-image: url('img/3.jpg')"></div>
            <div class="cell" onclick="toggle(this)" data-id="4" style="background-image: url('img/4.jpg')"></div>
            <div class="cell" onclick="toggle(this)" data-id="5" style="background-image: url('img/5.jpg')"></div>
            <div class="cell" onclick="toggle(this)" data-id="6" style="background-image: url('img/6.jpg')"></div>
            <div class="cell" onclick="toggle(this)" data-id="7" style="background-image: url('img/7.jpg')"></div>
            <div class="cell" onclick="toggle(this)" data-id="8" style="background-image: url('img/8.jpg')"></div>
            <div class="cell" onclick="toggle(this)" data-id="9" style="background-image: url('img/9.jpg')"></div>
        </div>

        <button onclick="verify()">ПОДТВЕРДИТЬ ДРУЖБУ</button>
    </div>

    <div id="message"></div>

    <script>
        function toggle(el) {
            el.classList.toggle('selected');
        }

        function verify() {
            const selected = Array.from(document.querySelectorAll('.cell.selected')).map(el => el.dataset.id).sort();
            const msg = document.getElementById('message');
            
            // Задай здесь ID картинок, которые считаются правильными
            const correctSolution = ['1', '3', '7', '8'].sort(); 

            const isCorrect = selected.length === correctSolution.length && 
                              selected.every((val, index) => val === correctSolution[index]);

            if (isCorrect) {
                msg.style.color = "green";
                msg.innerText = "ДРУЖБА ПОДТВЕРЖДЕНА. ВХОД...";
                setTimeout(() => {
                    window.location.href = "main.html";
                }, 1500);
            } else {
                msg.style.color = "red";
                msg.innerText = "ОШИБКА. ВЫ НЕ ВИДИТЕ РАДОСТИ. ПОПРОБУЙТЕ СНОВА.";
                document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected'));
            }
        }
    </script>
</body>
</html>
