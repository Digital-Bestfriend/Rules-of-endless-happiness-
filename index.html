<!DOCTYPE html>

    <style>

            background-color: #ffffff; /* Стерильно белый */

            display: flex;

        }

            color: #888;
            margin-bottom: 20px;
        }

</head>

    <div class="container">
        <div class="status">СИСТЕМА ДОБРЯК v4.02 // СТАТУС: СТАБИЛЬНО</div>

        <input type="password" placeholder="****">

</html>
