<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АВТОРИЗАЦИЯ // ЦЕНТРАЛЬНЫЙ УЗЕЛ</title>
    <style>
        /* Стерильный стиль А11 */
        body {
            background-color: #ffffff;
            color: #1a1a1a;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-transform: uppercase;
            overflow: hidden; 
            transition: background-color 0.1s;
        }

        /* Эффект помех (Glitch) */
        .glitch {
            animation: glitch-anim 0.15s infinite;
            filter: contrast(300%) brightness(120%) invert(5%);
            background-color: #f0f0f0 !important;
        }

        @keyframes glitch-anim {
            0% { transform: translate(0); }
            20% { transform: translate(-8px, 4px) skewX(10deg); }
            40% { transform: translate(8px, -4px) skewY(-5deg); }
            60% { transform: translate(-10px, -2px); filter: hue-rotate(180deg); }
            80% { transform: translate(4px, 6px); }
            100% { transform: translate(0); }
        }

        .header {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .captcha-box {
            border: 1px solid #1a1a1a;
            padding: 20px;
            width: 320px;
            background: #f9f9f9;
        }

        .instruction {
            background: #1a1a1a;
            color: #fff;
            padding: 15px;
            font-size: 14px;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }

        .cell {
            width: 100px;
            height: 100px;
            background: #eee;
            cursor: pointer;
            border: 2px solid transparent;
            position: relative;
            background-size: cover;
            background-position: center;
            filter: grayscale(100%); 
            transition: filter 0.3s;
        }

        .cell:hover {
            filter: grayscale(0%);
        }

        .cell.selected {
            border-color: #00ff00;
            filter: grayscale(0%);
        }

        .cell.selected::after {
            content: '✓';
            position: absolute;
            top: 5px;
            right: 5px;
            background: #00ff00;
            color: #fff;
            font-size: 12px;
            padding: 2px 5px;
            font-weight: bold;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 1px;
        }

        #message {
            margin-top: 15px;
            font-size: 10px;
            text-align: center;
            height: 12px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body id="body">

    <div class="header">ЦЕНТРАЛЬНЫЙ УЗЕЛ // АВТОРИЗАЦИЯ</div>

    <div class="captcha-box" id="captcha">
        <div class="instruction">
            ВЫБЕРИТЕ ВСЕ ИЗОБРАЖЕНИЯ, ГДЕ ЛЮДИ <br><strong>ДЕЙСТВИТЕЛЬНО СЧАСТЛИВЫ</strong>
        </div>
        
        <div class="grid">
            <div class="cell" onclick="toggle(this)" data-id="1" style="background-image: url('img/1.jpg')"></div>
            <div class="cell" onclick="toggle(this)" data-id="2" style="background-image: url('img/2.jpg')"></div>
            <div class="cell" onclick="toggle(this)" data-id="3" style="background-image: url('img/3.jpg')"></div>
            <div class="cell" onclick="toggle(this)" data-id="4" style="background-image: url('img/4.jpg')"></div>
            <div class="cell" onclick="toggle(this)" data-id="5" style="background-image: url('img/5.jpg')"></div>
            <div class="cell" onclick="toggle(this)" data-id="6" style="background-image: url('img/6.jpg')"></div>
            <div class="cell" onclick="toggle(this)" data-id="7" style="background-image: url('img/7.jpg')"></div>
            <div class="cell" onclick="toggle(this)" data-id="8" style="background-image: url('img/8.jpg')"></div>
            <div class="cell" onclick="toggle(this)" data-id="9" style="background-image: url('img/9.jpg')"></div>
        </div>

        <button onclick="verify()">ПОДТВЕРДИТЬ ДРУЖБУ</button>
    </div>

    <div id="message"></div>

    <script>
        function playSfx(file) {
            const audio = new Audio('sound/' + file);
            audio.volume = 0.4;
            audio.play().catch(() => {});
        }

        function toggle(el) {
            el.classList.toggle('selected');
            playSfx('click.mp3');
        }

        function verify() {
            const selected = Array.from(document.querySelectorAll('.cell.selected'))
                                  .map(el => el.dataset.id)
                                  .sort();
            const msg = document.getElementById('message');
            const body = document.getElementById('body');
            
            // Замени эти ID на правильные (те, что должны быть выбраны)
            const correctSolution = ['1', '3', '7', '8'].sort(); 

            const isCorrect = selected.length === correctSolution.length && 
                              selected.every((val, index) => val === correctSolution[index]);

            if (isCorrect) {
                playSfx('success.mp3');
                msg.style.color = "#00bb00";
                msg.innerText = "ДРУЖБА ПОДТВЕРЖДЕНА. ВХОД...";
                setTimeout(() => {
                    window.location.href = "main.html";
                }, 1500);
            } else {
                // Эффект ошибки (1.7 секунды)
                playSfx('error.mp3'); 
                body.classList.add('glitch');
                msg.style.color = "#ff0000";
                msg.innerText = "ОШИБКА. ВЫ НЕ ВИДИТЕ РАДОСТИ. ПОПРОБУЙТЕ СНОВА.";
                
                setTimeout(() => {
                    body.classList.remove('glitch');
                    // Сброс всех галочек после завершения глитча
                    document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected'));
                }, 1700); 
            }
        }
    </script>
</body>
</html>
